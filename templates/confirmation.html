<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>COM/VERGE Confirmation</title>
  <style>
    body {
      font-family: "Courier New", Courier, monospace;
      line-height: 1.5;
      color: #111;
      background: #f6f6f6;
    }

    .container {
      max-width: 640px;
      margin: 24px auto;
      padding: 0;
      background: #ffffff;
      border: 3px solid #111;
    }

    .header {
      background: #111;
      padding: 20px 24px;
      border-bottom: 3px solid #111;
    }

    .header h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #fff;
    }

    .content {
      padding: 24px;
    }

    .panel {
      border: 3px solid #111;
      padding: 16px;
      background: #fff5d6;
    }

    .cta {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 14px;
      border: 3px solid #111;
      text-decoration: none;
      color: #fff;
      background: #111;
      font-weight: 700;
      text-transform: uppercase;
    }

    .footer {
      padding: 16px 24px;
      border-top: 3px solid #111;
      font-size: 12px;
      color: #333;
      background: #f2f4f7;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>COM/VERGE Confirmation</h1>
    </div>
    <div class="content">
      <p>Hi {{ name }},</p>
      <p>Thanks for registering as <strong>{{ profile }}</strong>.</p>
      <div class="panel">
        <p>Your submission is in. We will review it and get back to you soon.</p>
        <p>While you wait, keep an eye on COM/VERGE updates.</p>
      </div>
      <a class="cta" href="https://comverge.rived.community">Visit the Summit</a>
    </div>
    <div class="footer">
      <p>COM/VERGE by RIVED © 2026. This message was generated automatically.</p>
    </div>
  </div>
</body>

</html>
